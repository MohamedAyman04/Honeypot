apiVersion: 1
datasources:
  - name: InfluxDB L2
    uid: influxdb-l2
    type: influxdb
    access: proxy
    url: http://historian:8086
    jsonData:
      version: Flux
      organization: my_refinery
      defaultBucket: sensor_logs
    secureJsonData:
      token: supersecrettoken
    isDefault: true
