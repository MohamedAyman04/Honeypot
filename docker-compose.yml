services:
  # ── Shared State Store (Redis) ────────────────────────────────────────────────
  redis:
    image: redis:latest
    container_name: ics_state_store
    networks:
      - ot-net
    restart: always

  # ── Physical Process Simulator (Purdue Level 0/1 Simulation) ──────────────────
  physics_simulator:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: ics_physics_engine
    command: python /app/physics/physics_process.py
    networks:
      - ot-net
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  # ── Modbus PLC Simulator (Purdue Level 2 - Exposed via DMZ) ───────────────────
  plc_simulator:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: plc_simulator
    command: python /app/plc/modbus_server.py
    ports:
      - "502:502"
    networks:
      - dmz-net
      - ot-net
      - monitor-net
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    depends_on:
      - redis
      - physics_simulator
      - historian
    restart: unless-stopped

  # ── S7comm PLC Honeypot (Siemens S7-300 emulation) ───────────────────────────
  ics_s7_plc:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: ics_s7_plc
    command: python /app/plc/s7_server.py
    networks:
      - dmz-net
      - ot-net
      - monitor-net
    ports:
      - "102:102"
    volumes:
      - shared-data:/data
    env_file: .env
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    depends_on:
      - redis
      - physics_simulator
    restart: always

  # ── Deception Fake PLC (Dead-end Modbus device) ──────────────────────────────
  fake_plc_sim:
    build:
      context: ./fake_plc
    container_name: fake_plc_sim
    networks:
      - dmz-net
      - ot-net
    ports:
      - "503:502"
    restart: unless-stopped

  # ── DNP3 Honeypot (power/water utility protocol) ─────────────────────────────
  ics_dnp3:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: ics_dnp3
    command: python /app/plc/dnp3_server.py
    networks:
      - dmz-net
      - monitor-net
    ports:
      - "20000:20000"
    env_file: .env
    environment:
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    depends_on:
      - historian
    restart: unless-stopped

  # ── SCADA SSH Workstation (Purdue Level 2 — Lateral Movement Pivot) ───────────
  # Exposes:
  #   :2222  — SSH service (lateral-movement target; engineer/operator accounts)
  #   :5100  — Physics REST API (unauthenticated; cross-layer data bridge to L3)
  ics_scada_ssh:
    build:
      context: . # Level 2 root — gives access to physics/ package
      dockerfile: scada_ssh/Dockerfile # explicit path because context is now the parent
    container_name: ics_scada_ssh
    networks:
      ot-net: {}
      dmz-net: {}
      enterprise-net:
        ipv4_address: 192.168.50.10 # static IP — referenced by L3 OPC-UA bridge
      l2l3-bridge-net:
        ipv4_address: 172.28.0.10 # shared bridge to Level 3 stack
    cap_add:
      - NET_ADMIN
    ports:
      - "2222:2222" # SSH
      - "5100:5100" # Physics REST API (Level 2 → Level 3 data flow)
    environment:
      - REDIS_HOST=${REDIS_HOST}
      - PHYSICS_API_PORT=5100
      - LOG_DIR=/var/log/honeynet
      - L2L3_SHARED_TOKEN=${L2L3_SHARED_TOKEN:-change-this-token}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    volumes:
      - unified-logs:/var/log/honeynet # unified log volume shared across services
    restart: unless-stopped

  # ── HMI Web Dashboard (Purdue Level 2) ────────────────────────────────────────
  hmi:
    build:
      context: ./hmi
    container_name: ics_hmi
    depends_on:
      plc_simulator:
        condition: service_started
    networks:
      - ot-net
      - monitor-net
    ports:
      - "8060:8060"
    env_file: .env
    environment:
      - PLC_IP=${PLC_IP}
      - REDIS_HOST=${REDIS_HOST}
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    restart: unless-stopped
    command: python hmi_app.py

  # ── Historian Bridge (Modbus → InfluxDB) ─────────────────────────────────────
  historian_bridge:
    build:
      context: ./hmi
    container_name: ics_historian_bridge
    command: python hmi_simulator.py
    depends_on:
      plc_simulator:
        condition: service_started
      historian:
        condition: service_started
    networks:
      - dmz-net
      - ot-net
      - monitor-net
    env_file: .env
    environment:
      - PLC_IP=${PLC_IP}
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    restart: unless-stopped

  # ── ML Anomaly Detection Engine (Purdue Level 2 - Isolated Monitoring) ────────
  ml_engine:
    build:
      context: ./ml-engine
    container_name: ics_ml_engine
    volumes:
      - shared-data:/data # model files persisted here
      - ./shared:/app/shared:ro # MITRE mapping table
    depends_on:
      historian:
        condition: service_started
    networks:
      - monitor-net
    ports:
      - "8001:8000"
    env_file: .env
    environment:
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - STORY_LOGGER_URL=http://story_logger:8600
      - STORY_RUN_ID=${STORY_RUN_ID}
    restart: unless-stopped

  # ── Historian API (Purdue Level 3 Integration Bridge) ─────────────────────────
  historian_api:
    build:
      context: ./historian_api
    container_name: ics_historian_api
    depends_on:
      - historian
      - ml_engine
      - ics_scada_ssh
    networks:
      - monitor-net
      - enterprise-net
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - ML_ENGINE_URL=${ML_ENGINE_URL}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - SCADA_SSH_HOST=${SCADA_SSH_HOST}
      - SCADA_SSH_PORT=${SCADA_SSH_PORT}
      - SCADA_SSH_USER=${SCADA_SSH_USER}
      - SCADA_SSH_PASS=${SCADA_SSH_PASS}
    restart: unless-stopped

  # ── Network Sniffer / Logger (Full Interface Capture) ────────────────────────
  network_sniffer:
    build:
      context: ./logger
    container_name: ics_sniffer
    command: python logger.py
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
    volumes:
      - shared-data:/data
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}

  # ── Cross-Layer Correlator (Sniffer → InfluxDB) ───────────────────────────────
  correlator:
    build:
      context: ./logger
    container_name: ics_correlator
    depends_on:
      - plc_simulator
      - historian
    network_mode: service:plc_simulator
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./shared:/app/shared:ro # MITRE mapping table
    env_file: .env
    environment:
      - PLC_IP=127.0.0.1
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
    restart: unless-stopped

  # ── InfluxDB Historian (Purdue Level 2/3 Data Store) ─────────────────────────
  historian:
    image: influxdb:2.7.6
    container_name: ics_historian
    ports:
      - "8086:8086"
    env_file: .env
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=${DOCKER_INFLUXDB_INIT_MODE}
      - DOCKER_INFLUXDB_INIT_USERNAME=${DOCKER_INFLUXDB_INIT_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${DOCKER_INFLUXDB_INIT_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${DOCKER_INFLUXDB_INIT_ADMIN_TOKEN}
      - DOCKER_INFLUXDB_INIT_ORG=${DOCKER_INFLUXDB_INIT_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${DOCKER_INFLUXDB_INIT_BUCKET}
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - monitor-net
      - ot-net
      - enterprise-net
    restart: unless-stopped

  # ── Grafana Image Renderer ─────────────────────────────────────────────────
  grafana-image-renderer:
    image: grafana/grafana-image-renderer:latest
    container_name: ics_grafana_renderer
    networks:
      - monitor-net
    environment:
      - ENABLE_METRICS=true
      - RENDERING_MODE=default
      - RENDERING_CLUSTERING_MODE=context
      - RENDERING_CLUSTERING_MAX_CONCURRENCY=5
      - LOG_LEVEL=info
      - AUTH_TOKEN=${GF_RENDERING_AUTH_TOKEN}
    restart: unless-stopped

  # ── Grafana Dashboard (Visualization) ─────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ics_grafana
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./grafana_provisioning:/etc/grafana/provisioning
      - ./grafana_dashboards:/var/lib/grafana/dashboards
    env_file: .env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=${GF_AUTH_ANONYMOUS_ENABLED}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=${GF_AUTH_ANONYMOUS_ORG_ROLE}
      - GF_RENDERING_SERVER_URL=${GF_RENDERING_SERVER_URL}
      - GF_RENDERING_CALLBACK_URL=${GF_RENDERING_CALLBACK_URL}
      - GF_LOG_FILTERS=${GF_LOG_FILTERS}
      - GF_RENDERING_RENDERER_TOKEN=${GF_RENDERING_RENDERER_TOKEN}
    depends_on:
      - historian
      - grafana-image-renderer
    networks:
      - monitor-net
    dns:
      - 127.0.0.11
    restart: unless-stopped

  # ── Attacker Node (Purdue Level 3.5 / External Threat Simulation) ─────────────
  attacker_node:
    build:
      context: ./attacker_node
    container_name: attacker_node
    networks:
      - dmz-net
      - monitor-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./results:/app/results # persists CSV results across container restarts
    env_file: .env
    environment:
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - STORY_LOGGER_URL=http://story_logger:8600
      - STORY_RUN_ID=${STORY_RUN_ID}
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ── Story Logger (cross-level narrative log) ───────────────────────────────
  story_logger:
    build:
      context: ../Industrial-honeypot/story_logger
      dockerfile: Dockerfile
    container_name: story_logger_l2
    ports:
      - "8600:8600"
    volumes:
      - .:/repo
    environment:
      - "STORY_LOG_PATH=/repo/general logs.jsonl"
      - PYTHONUNBUFFERED=1
    networks:
      - dmz-net
      - monitor-net
      - l2l3-bridge-net
    restart: unless-stopped

  # ── Honeypot Historian API (DMZ-facing decoy) ─────────────────────────────────
  honeypot_historian_api:
    build:
      context: ./honeypot_historian_api
    container_name: honeypot_historian_api
    networks:
      - dmz-net
      - monitor-net
    ports:
      - "5002:5000"
    env_file: .env
    environment:
      - INFLUX_URL=${INFLUX_URL}
      - INFLUX_TOKEN=${INFLUX_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
      - PYTHONUNBUFFERED=${PYTHONUNBUFFERED}
      - SCADA_SSH_HOST=${SCADA_SSH_HOST}
      - SCADA_SSH_PORT=${SCADA_SSH_PORT}
      - SCADA_SSH_USER=${HONEYPOT_SSH_USER}
      - SCADA_SSH_PASS=${HONEYPOT_SSH_PASS}
    depends_on:
      - historian
      - ics_scada_ssh
    restart: unless-stopped

  # ── Level 2 Log Dashboard (Streamlit — mirrors L3 :8501) ─────────────────────
  log_dashboard:
    build:
      context: ./log_dashboard
    container_name: ics_log_dashboard
    ports:
      - "8502:8501"
    volumes:
      - "./general logs.jsonl:/data/general_logs.jsonl"
    networks:
      - monitor-net
    env_file: .env
    environment:
      - LOG_FILE_PATH=/data/general_logs.jsonl
      - PYTHONUNBUFFERED=1
    depends_on:
      - historian
    restart: unless-stopped

volumes:
  shared-data:
  influx-data:
  unified-logs:
    # shared JSONL log volume — all services write to this

networks:
  # Purdue Level 1/2 — OT process network (physics, PLCs, Redis)
  ot-net:
    driver: bridge

  # Purdue Level 3.5 — DMZ (external-facing: Modbus, S7, DNP3, SCADA SSH)
  dmz-net:
    driver: bridge

  # Purdue Level 2 — Monitoring network (historian, ML engine, Grafana)
  monitor-net:
    driver: bridge

  # Purdue Level 3 — Enterprise network (historian API, SCADA SSH)
  enterprise-net:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.50.0/24

  # Shared bridge between Level 2 and Level 3 stacks.
  # Create before first run:  docker network create l2l3-bridge-net --subnet 172.28.0.0/24
  l2l3-bridge-net:
    external: true
