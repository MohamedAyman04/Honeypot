version: "3.8"

services:
  # ── Modbus PLC Simulator (Purdue Level 1) ────────────────────────────────────
  plc_simulator:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: plc_simulator
    ports:
      - "502:502"
    networks:
      - dmz-net
      - monitor-net
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUX_URL=http://ics_historian:8086
      - INFLUX_TOKEN=supersecrettoken
      - INFLUX_ORG=my_refinery
      - INFLUX_BUCKET=sensor_logs
    depends_on:
      historian:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/app/plc/healthcheck.py"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── S7comm PLC Honeypot (Siemens S7 emulation) ───────────────────────────────
  ics_s7_plc:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: ics_s7_plc
    command: python /app/plc/s7_server.py
    networks:
      - dmz-net
    ports:
      - "102:102"
    restart: always
    healthcheck:
      test: ["CMD", "python", "/app/plc/s7_healthcheck.py"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s

  # ── DNP3 Honeypot (power/water utility protocol) ─────────────────────────────
  ics_dnp3:
    build:
      context: .
      dockerfile: plc/Dockerfile
    container_name: ics_dnp3
    command: python /app/plc/dnp3_server.py
    networks:
      - dmz-net
      - monitor-net
    ports:
      - "20000:20000"
    environment:
      - PYTHONUNBUFFERED=1
      - INFLUX_URL=http://ics_historian:8086
      - INFLUX_TOKEN=supersecrettoken
      - INFLUX_ORG=my_refinery
      - INFLUX_BUCKET=sensor_logs
    depends_on:
      historian:
        condition: service_started
    restart: unless-stopped

  # ── HMI Web Dashboard ─────────────────────────────────────────────────────────
  hmi:
    build:
      context: ./hmi
    container_name: ics_hmi
    depends_on:
      plc_simulator:
        condition: service_healthy
    networks:
      - ot-net
      - dmz-net
    ports:
      - "8060:8060"
    environment:
      - PLC_IP=plc_simulator
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: >
      sh -c "sleep 5 && python hmi_app.py"

  # ── Historian Bridge (Modbus → InfluxDB) ─────────────────────────────────────
  historian_bridge:
    build:
      context: ./hmi
    container_name: ics_historian_bridge
    command: python hmi_simulator.py
    depends_on:
      plc_simulator:
        condition: service_healthy
      historian:
        condition: service_started
    networks:
      - dmz-net
      - monitor-net
    environment:
      - PLC_IP=plc_simulator
      - INFLUX_URL=http://ics_historian:8086
      - INFLUX_TOKEN=supersecrettoken
      - INFLUX_ORG=my_refinery
      - INFLUX_BUCKET=sensor_logs
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── ML Anomaly Detection Engine ───────────────────────────────────────────────
  ml_engine:
    build:
      context: ./ml-engine
    container_name: ics_ml_engine
    volumes:
      - shared-data:/data
    depends_on:
      historian:
        condition: service_started
    networks:
      - monitor-net
    environment:
      - INFLUX_URL=http://ics_historian:8086
      - INFLUX_TOKEN=supersecrettoken
      - INFLUX_ORG=my_refinery
      - INFLUX_BUCKET=sensor_logs
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── Network Sniffer / Logger ──────────────────────────────────────────────────
  network_sniffer:
    build:
      context: ./logger
    container_name: ics_sniffer
    command: python logger.py
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host # Must see actual network traffic
    volumes:
      - shared-data:/data
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  # ── Cross-Layer Correlator ────────────────────────────────────────────────────
  correlator:
    build:
      context: ./logger
    container_name: ics_correlator
    depends_on:
      - plc_simulator
      - historian
    networks:
      - dmz-net
      - monitor-net
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PLC_IP=plc_simulator
      - INFLUX_URL=http://ics_historian:8086
      - INFLUX_TOKEN=supersecrettoken
      - INFLUX_ORG=my_refinery
      - INFLUX_BUCKET=sensor_logs
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── InfluxDB Historian ─────────────────────────────────────────────────────────
  historian:
    image: influxdb:latest
    container_name: ics_historian
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=supersecrettoken
      - DOCKER_INFLUXDB_INIT_ORG=my_refinery
      - DOCKER_INFLUXDB_INIT_BUCKET=sensor_logs
    volumes:
      - influx-data:/var/lib/influxdb2
    networks:
      - monitor-net
    restart: unless-stopped

  # ── Grafana Dashboard ──────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: ics_grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana_provisioning:/etc/grafana/provisioning
      - ./grafana_dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - historian
    networks:
      - monitor-net
    restart: unless-stopped

volumes:
  shared-data:
  influx-data:

networks:
  dmz-net:
    driver: bridge
  ot-net:
    driver: bridge
  monitor-net:
    driver: bridge
